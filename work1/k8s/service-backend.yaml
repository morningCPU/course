apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: default
  labels:
    app: backend
  annotations:
    kubernetes.io/elb.class: union
    kubernetes.io/elb.type: public
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    protocol: TCP
