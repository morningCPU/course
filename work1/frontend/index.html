<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云计算课程设计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .student-info {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .student-info h2 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .student-info p {
            color: #555;
            font-size: 1.1em;
            line-height: 1.8;
            margin: 10px 0;
        }

        .student-info strong {
            color: #764ba2;
        }

        .status {
            text-align: center;
            padding: 20px;
            background: #d4edda;
            border-radius: 10px;
            color: #155724;
            font-size: 1.2em;
        }

        .api-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1em;
            transition: background 0.3s;
        }

        .api-link:hover {
            background: #764ba2;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>☁️ 云计算课程设计</h1>

        <div class="student-info">
            <h2>学生信息</h2>
            <p><strong>学号：</strong>2023113025</p>
            <p><strong>姓名：</strong>刘逸鑫</p>
        </div>

        <div class="student-info">
            <h2>学生信息</h2>
            <p><strong>学号：</strong>2023112983</p>
            <p><strong>姓名：</strong>文焕</p>
        </div>

        <div class="status">
            ✅ 应用运行正常
        </div>

        <a href="/api/ping" class="api-link">测试后端 API</a>
    </div>
</body>

</html>
